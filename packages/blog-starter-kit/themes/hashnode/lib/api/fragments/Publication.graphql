fragment Publication on Publication {
	id
	imprintV2 {
		html
	}
	title
	displayTitle
	url
	urlPattern
	metaTags
	favicon
	isTeam
	headerColor
	followersCount
	descriptionSEO
	about {
		html
	}
	features {
		newsletter {
			isEnabled
		}
		viewCount {
			isEnabled
		}
		readTime {
			isEnabled
		}
		textSelectionSharer {
			isEnabled
		}
	}
	author {
		id
		name
		username
		profilePicture
		followersCount
	}
	ogMetaData {
		image
	}
	preferences {
		layout
		logo
		disableFooterBranding
		enabledPages {
			newsletter
			members
		}
		darkMode {
			enabled
			logo
		}
		navbarItems {
			__typename
			id
			label
			url
			type
			series {
				__typename
				id
			}
			page {
				__typename
				id
			}
		}
	}
	links {
		twitter
		instagram
		github
		website
		hashnode
		youtube
		linkedin
		mastodon
	}
}
